# Nixpacks build config for the FastAPI backend.
# Installs deps from BOTH the parent requirements.txt (qa.py, indexer.py needs)
# AND backend/requirements.txt (FastAPI, uvicorn).

[phases.install]
cmds = [
    "python -m pip install --upgrade pip",
    "python -m pip install -r requirements.txt",
    "python -m pip install -r backend/requirements.txt",
]

[phases.setup]
aptPkgs = ["build-essential"]
