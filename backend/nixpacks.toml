# Nixpacks build config for the FastAPI backend service.
# Railway root-dir is set to `backend`, so Nixpacks scans from HERE — meaning
# the `frontend/` folder is never seen and Node.js is never auto-detected.
#
# We still need to reach OUTSIDE our root to install the parent
# requirements.txt (qa.py, indexer.py etc live at the repo root and have
# their own deps). We do this via `..` in the install commands.

providers = ["python"]

[phases.setup]
aptPkgs = ["build-essential"]

[phases.install]
cmds = [
    "python -m venv --copies /opt/venv",
    ". /opt/venv/bin/activate && pip install --upgrade pip",
    ". /opt/venv/bin/activate && pip install -r ../requirements.txt",
    ". /opt/venv/bin/activate && pip install -r requirements.txt",
]

[start]
cmd = ". /opt/venv/bin/activate && python -m uvicorn main:app --host 0.0.0.0 --port $PORT"
